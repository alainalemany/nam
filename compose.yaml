name: nam

services:
  # Phase 2B will add the app service here and attach it to nam-network.
  # PostgreSQL remains private to Docker; do not publish database ports.
  postgres:
    image: postgres:18
    container_name: nam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - nam-network

volumes:
  postgres-data:
    name: postgres-data

networks:
  nam-network:
    name: nam-network
    driver: bridge
