name: nam

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nam-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      NAM_CHECKLIST_RESULT_SIGNING_SECRET: ${NAM_CHECKLIST_RESULT_SIGNING_SECRET:-}
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - nam-network

  # PostgreSQL remains private to Docker; do not publish database ports.
  postgres:
    image: postgres:18
    container_name: nam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - nam-network

volumes:
  postgres-data:
    name: postgres-data

networks:
  nam-network:
    name: nam-network
    driver: bridge
